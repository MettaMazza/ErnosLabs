# Ernos Labs — static deploy. The site is prebuilt: src/*.ep is compiled to
# assets/js/*.js by build.sh before deploying (Netlify does not run the Ernos
# compiler), so there is no build step here — just publish the repo root.
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Cross-Origin isolation for multi-threaded WASM (Kokoro TTS)
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
